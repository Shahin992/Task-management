<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://s3.us-east-1.amazonaws.com/pypepro/user/userFavIcon/14752-rYalbLq5Du.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Management System</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) {
          return;
        }

        window.addEventListener('load', function () {
          navigator.serviceWorker.getRegistrations()
            .then(function (registrations) {
              return Promise.all(registrations.map(function (registration) {
                return registration.unregister();
              }));
            })
            .catch(function (error) {
              console.warn('Failed to unregister stale service workers.', error);
            })
            .finally(function () {
              if (!('caches' in window)) {
                return;
              }

              window.caches.keys()
                .then(function (keys) {
                  return Promise.all(keys.map(function (key) {
                    return window.caches.delete(key);
                  }));
                })
                .catch(function (error) {
                  console.warn('Failed to clear stale browser caches.', error);
                });
            });
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
